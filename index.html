<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>U-Bahn Explorer</title>

<style>
body {
margin:0;
overflow:hidden;
background:black;
}

#instructions {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,0.7);
padding:20px 30px;
border-radius:8px;
text-align:center;
cursor:pointer;
}
</style>

</head>

<body>

<div id="instructions">
Click to Start<br>
Use W A S D to move
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.159/build/three.module.js";
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.159/examples/jsm/controls/PointerLockControls.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.159/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);

document.getElementById("instructions").onclick = () => controls.lock();

scene.add(controls.getObject());

const light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

const loader = new GLTFLoader();

loader.load("station.glb", function(gltf){
scene.add(gltf.scene);
});

camera.position.y = 1.7;

const velocity = new THREE.Vector3();

document.addEventListener("keydown",(e)=>{
if(e.code==="KeyW") velocity.z=-0.1;
if(e.code==="KeyS") velocity.z=0.1;
if(e.code==="KeyA") velocity.x=-0.1;
if(e.code==="KeyD") velocity.x=0.1;
});

document.addEventListener("keyup",()=>velocity.set(0,0,0));

function animate(){
requestAnimationFrame(animate);
controls.moveRight(velocity.x);
controls.moveForward(velocity.z);
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
